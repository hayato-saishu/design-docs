openapi: 3.0.3
info:
  title: 家計簿アプリ API
  description: 家計簿アプリ REST API仕様書
  version: 1.0.0

servers:
  - url: https://api.kakeibo.example.com/v1
    description: 本番環境
  - url: https://stg-api.kakeibo.example.com/v1
    description: ステージング環境
  - url: http://localhost:3000/v1
    description: 開発環境

tags:
  - name: auth
    description: 認証・認可
  - name: users
    description: ユーザー管理
  - name: transactions
    description: 収支明細管理
  - name: categories
    description: カテゴリ管理
  - name: recurring-incomes
    description: 定期収入設定

paths:
  /users:
    post:
      tags: [users]
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  maxLength: 50
                  example: 山田 太郎
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "password123"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: メールアドレス重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: EMAIL_ALREADY_EXISTS
                message: このメールアドレスはすでに登録されています

  /auth/login:
    post:
      tags: [auth]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "password123"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: アクセストークン（JWT, 有効期限1時間）
                  refresh_token:
                    type: string
                    description: リフレッシュトークン（有効期限30日）
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [auth]
      summary: ログアウト
      security:
        - BearerAuth: []
      responses:
        "200":
          description: ログアウト成功
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [auth]
      summary: アクセストークン更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: トークン更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /transactions:
    get:
      tags: [transactions]
      summary: 明細一覧取得
      description: 月別・カテゴリ別で絞り込み可能。収支サマリーも返却する。
      security:
        - BearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 3
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  summary:
                    $ref: "#/components/schemas/TransactionSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [transactions]
      summary: 明細登録
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, type, amount, date]
              properties:
                category_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [income, expense]
                amount:
                  type: integer
                  minimum: 1
                  example: 5000
                memo:
                  type: string
                  maxLength: 200
                  example: スーパーで食材購入
                date:
                  type: string
                  format: date
                  example: "2026-03-08"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /transactions/{id}:
    put:
      tags: [transactions]
      summary: 明細更新
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id:
                  type: string
                  format: uuid
                amount:
                  type: integer
                  minimum: 1
                memo:
                  type: string
                  maxLength: 200
                date:
                  type: string
                  format: date
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [transactions]
      summary: 明細削除
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /categories:
    get:
      tags: [categories]
      summary: カテゴリ一覧取得
      description: システム共通カテゴリとユーザー独自カテゴリを返却する。
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [categories]
      summary: カテゴリ作成
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  maxLength: 50
                  example: 外食
                type:
                  type: string
                  enum: [income, expense]
                color:
                  type: string
                  example: "#FF5733"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /recurring-incomes:
    get:
      tags: [recurring-incomes]
      summary: 定期収入設定一覧取得
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecurringIncome"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [recurring-incomes]
      summary: 定期収入設定登録
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, amount, day_of_month]
              properties:
                category_id:
                  type: string
                  format: uuid
                amount:
                  type: integer
                  minimum: 1
                  example: 250000
                memo:
                  type: string
                  maxLength: 200
                  example: 給与
                day_of_month:
                  type: integer
                  minimum: 1
                  maximum: 28
                  example: 25
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringIncome"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /recurring-incomes/{id}:
    put:
      tags: [recurring-incomes]
      summary: 定期収入設定更新
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id:
                  type: string
                  format: uuid
                amount:
                  type: integer
                  minimum: 1
                memo:
                  type: string
                  maxLength: 200
                day_of_month:
                  type: integer
                  minimum: 1
                  maximum: 28
                is_active:
                  type: boolean
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringIncome"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [recurring-incomes]
      summary: 定期収入設定削除
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [income, expense]
        color:
          type: string
          example: "#FF5733"
        is_system:
          type: boolean
          description: true=システム共通カテゴリ

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [income, expense]
        amount:
          type: integer
        memo:
          type: string
          nullable: true
        date:
          type: string
          format: date
        category:
          $ref: "#/components/schemas/Category"
        recurring_income_id:
          type: string
          format: uuid
          nullable: true
          description: 定期収入から自動生成された場合にセット
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TransactionSummary:
      type: object
      properties:
        total_income:
          type: integer
          description: 合計収入（円）
        total_expense:
          type: integer
          description: 合計支出（円）
        balance:
          type: integer
          description: 残高（収入 - 支出）

    RecurringIncome:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/Category"
        amount:
          type: integer
        memo:
          type: string
          nullable: true
        day_of_month:
          type: integer
          description: 毎月の反映日（1〜28）
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: UNAUTHORIZED
            message: 認証が必要です
    Forbidden:
      description: 権限エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: FORBIDDEN
            message: このリソースへのアクセス権限がありません
    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: NOT_FOUND
            message: リソースが見つかりません
